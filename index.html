<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deutsch B2 Pro Trainer</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1d;
            --glass: rgba(30, 41, 59, 0.7);
            --primary: #a78bfa;
            --success: #34d399;
            --danger: #f87171;
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Nunito', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0a0f1d);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Ngăn người dùng vô tình bôi đen văn bản khi chạm trên điện thoại */
        * {
            -webkit-user-select: none; /* Chrome, Safari, Opera */
            user-select: none; /* Chuẩn chung */
        }

        /* Ngoại trừ ô nhập liệu thì vẫn cho phép gõ và chọn chữ */
        textarea, input {
            -webkit-user-select: text;
            user-select: text;
        }

        .container { width: 100%; max-width: 420px; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { font-weight: 700; font-size: 20px; margin-top: 0; color: var(--primary); text-align: center; }

        .btn-main {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            color: white; font-weight: 700; font-size: 16px; cursor: pointer;
        }

        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-sub {
            flex: 1; padding: 8px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--text); font-size: 11px; cursor: pointer; text-align: center;
        }

        .quiz-vn { font-size: 26px; font-weight: 700; text-align: center; margin: 15px 0; line-height: 1.4; }
        .type-tag { 
            display: inline-block; padding: 4px 12px; background: rgba(167, 139, 250, 0.2); 
            color: var(--primary); border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase;
        }

        textarea#ans-input {
            width: 100%; 
            padding: 18px; 
            border-radius: 16px; 
            border: 2px solid var(--border);
            background: rgba(0,0,0,0.2); 
            color: white; 
            text-align: center; 
            outline: none; 
            box-sizing: border-box;
            font-family: 'Nunito', monospace; 
            font-size: 22px; 
            font-weight: 600; 
            letter-spacing: 1px; 
            font-variant-ligatures: none; 
            resize: none;
            line-height: 1.5;
            overflow: hidden;
        }

        .feedback-box { min-height: 70px; margin: 15px 0; text-align: center; font-size: 14px; }

        .heat-item {
            background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2);
            padding: 10px; border-radius: 14px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .streak-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #334155; }
        .dot.active { background: var(--success); box-shadow: 0 0 10px var(--success); }

        /* Nút Loa mới thiết kế giống App */
        .speaker-btn {
            background: rgba(167, 139, 250, 0.2);
            border: 1px solid var(--primary);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            margin-left: 10px;
        }
        .speaker-btn:active { background: var(--primary); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-screen">
        <div class="glass-card">
            <h2>Vokabelübung Kontext B2.1 <span id="lek-stats" style="font-size: 14px; font-weight: normal; color: var(--success); margin-left: 10px; background: rgba(52, 211, 153, 0.1); padding: 4px 10px; border-radius: 12px;">0/0</span></h2>
            
            <div id="lek-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px;"></div>
            
            <div style="display: flex; gap: 8px; margin-bottom: 20px;">
                <button class="btn-sub" id="btn-fehler" onclick="selectFehler()" style="border-color: var(--danger); color: var(--danger); font-weight: bold; flex: 1;">🚨 Lỗi Sai (Fehler)</button>
                <button class="btn-main" id="btn-adv" onclick="startAdvancedMode()" style="background: linear-gradient(135deg, #f59e0b, #ef4444); padding: 8px; font-size: 14px; flex: 1; border-radius: 10px;">🔥 Nâng cao B2</button>
            </div>

            <button class="btn-main" onclick="startSession('normal')">Bắt đầu học (5 từ)/Lerne (5 Wörter)</button>
            
            <div style="display: flex; gap: 8px; margin-top: 10px;">
                <button class="btn-main" style="background: linear-gradient(135deg, #3b82f6, #2dd4bf); font-size: 14px; padding: 12px; flex: 1;" onclick="startSession('mixed')">🔥 Ôn hỗn hợp (Tính Streak)-Gemischte Lernen</button>
                <button class="btn-main" style="background: linear-gradient(135deg, #10b981, #059669); font-size: 14px; padding: 12px; flex: 1;" onclick="startSession('quick')">⚡ Ôn nhanh (Không phạt)- Kurzrezension (Kein Steak ging verloren)!</button>
            </div>
            
            <div style="display: flex; gap: 8px; margin-top: 15px;">
                <button class="btn-sub" style="color: #34d399; border-color: #34d399; font-weight: bold;" onclick="exportData()">💾 Sao lưu Streak / Streak-Backup</button>
                <button class="btn-sub" style="color: #60a5fa; border-color: #60a5fa; font-weight: bold;" onclick="importData()">📂 Phục hồi Streak / Streak wiederherstellung</button>
            </div>
        </div>
        
        <div class="glass-card">
            <div class="btn-group">
                <button class="btn-sub" onclick="toggleAll(true)">Chọn hết/Alle auswählen</button>
                <button class="btn-sub" onclick="toggleAll(false)">Bỏ chọn/Auswahl aufheben</button>
                <button class="btn-sub" style="color: var(--danger)" onclick="resetStreak()">Xóa Streak/Streak löschen</button>
            </div>
            <div id="vocab-list" style="max-height: 200px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div style="font-size: 14px; color: #94a3b8; text-align: center; margin-bottom: 15px; font-style: italic;">
            💡 <b></b> [sich Akk/Dat] + [Präpositionen] + jemand../etwas (Akk/Dat) + <b>[Verben am Ende]</b>
        </div>
        <div class="glass-card">
            <div class="streak-dots" id="dots"></div>
            <div style="text-align: center;"><span class="type-tag" id="q-type"></span></div>
            <div class="quiz-vn" id="q-vn"></div>
            <textarea id="ans-input" rows="2" placeholder="Ergänzen Sie bitte den deutschen Text..." autocomplete="off"></textarea>
            <div class="feedback-box" id="fb"></div>
            <button class="btn-main" id="check-btn" onclick="processCheck()">Checken</button>
            <p onclick="location.reload()" style="text-align: center; font-size: 12px; color: var(--text); cursor: pointer; margin-top: 20px; opacity: 0.6">← Zurück zum Menü</p>
        </div>
        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                <span style="font-size: 13px; font-weight: 700; color: var(--danger)">TỪ HAY SAI (HEATMAP)</span>
                <span style="font-size: 11px; cursor: pointer; opacity: 0.6" onclick="resetHeat()">Xóa hết - Alles löschen</span>
            </div>
            <div id="heat-cloud"></div>
        </div>
    </div>
</div>

    // Hàm mở khóa Audio trên điện thoại
    function unlockAudio() {
        if ('speechSynthesis' in window) {
            const whisper = new SpeechSynthesisUtterance('');
            whisper.volume = 0;
            window.speechSynthesis.speak(whisper);
        }
        document.body.removeEventListener('touchstart', unlockAudio);
        document.body.removeEventListener('click', unlockAudio);
    }
    document.body.addEventListener('touchstart', unlockAudio);
    document.body.addEventListener('click', unlockAudio);

    function speakGerman(text) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();

        let cleanText = text.split(',')[0].trim();
        cleanText = cleanText
            .replace(/\+\s*(jmdm\.|jmdn\.|jmd\.|etw\.|etwas)\s*\((Da|Akk|D|A|Dat)\)/gi, (match, obj, kasus) => {
                let k = /Da|D|Dat/i.test(kasus) ? "Dativ" : "Akkusativ";
                let o = obj.includes('jmdm') ? "jemandem" : obj.includes('jmdn') ? "jemanden" : obj.includes('jmd') ? "jemand" : "etwas";
                return `plus ${k} ${o}`;
            })
            .replace(/\bAkk\b/g, "Akkusativ")
            .replace(/\bA\b/g, "Akkusativ")
            .replace(/\bDat\b/g, "Dativ")
            .replace(/\bDa\b/g, "Dativ")
            .replace(/\bD\b/g, "Dativ")
            .replace(/\bNom\b/g, "Nominativ")
            .replace(/\bGen\b/g, "Genitiv")
            .replace(/\bjmdm\b/gi, "jemandem")
            .replace(/\bjmdn\b/gi, "jemanden")
            .replace(/\betw\b/gi, "etwas")
            .replace(/\b(r|r\.)\/(e|e\.)\s+(\w+)/g, "der $3, die $3")
            .replace(/\br\.\s/g, "der ")
            .replace(/\be\.\s/g, "die ")
            .replace(/\bs\.\s/g, "das ");

        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'de-DE';
        utterance.rate = 0.85; 

        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(v => v.name.includes("Stefan")) || 
                               voices.find(v => v.name.includes("Google Deutsch")) ||
                               voices.find(v => v.lang.startsWith("de"));
        
        if (preferredVoice) utterance.voice = preferredVoice;
        window.speechSynthesis.speak(utterance);
    }

    function exportData() {
        const dataStr = JSON.stringify(mastery);
        const blob = new Blob([dataStr], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const dateString = new Date().toISOString().split('T')[0];
        a.download = `Streak_B2_Backup_${dateString}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.txt'; 
        input.onchange = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    mastery = JSON.parse(e.target.result);
                    save();
                    alert("✨ Phục hồi Streak thành công!");
                    location.reload();
                } catch(err) {
                    alert("File không hợp lệ!");
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

        currentLek = 'fehler';

        document.getElementById('btn-fehler').style.background = 'rgba(248, 113, 113, 0.2)';
        renderList();
    }

    function startAdvancedMode() {
        let notMastered = data.filter(v => mastery[v.word].a && mastery[v.word].s < 3);
        if (notMastered.length > 0) {
            return alert(`🛑 CHƯA ĐỦ ĐIỀU KIỆN LÀM B2!\nBạn còn ${notMastered.length} thẻ chưa hoàn thành!`);
        }

        isAdvancedMode = true;
        let availablePool = data.filter(v => mastery[v.word].a); 
        if (availablePool.length === 0) return alert("Vui lòng chọn ít nhất 1 câu!");
        
        session = availablePool.sort(() => 0.5 - Math.random()).slice(0, 5);
        idx = 0; currentStep = 1; penaltyMode = false; penaltyCount = 0; isWaitingForNext = false;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        renderHeat(); 
        showWord();
    }

    function normalizeGerman(text) {
        if (!text) return "";
        return text.toLowerCase()
            .replace(/\b(r\s*\/?\s*e|e\s*\/?\s*r|r\.\s*\/?\s*e\.|e\.\s*\/?\s*r\.)\b/g, "der die")
            .replace(/[.,\/()]/g, " ")
            .replace(/\s+/g, ' ').trim()
            .replace(/\betw\b/g, "etwas")
            .replace(/\bjmdn\b/g, "jemanden")
            .replace(/\bjmdm\b/g, "jemandem")
            .replace(/\bjmd\b/g, "jemand")
            .replace(/\br\b/g, "der")
            .replace(/\be\b/g, "die")
            .replace(/\bs\b/g, "das")
            .replace(/\b(d|da|dat)\b/g, "dativ")
            .replace(/\b(a|akk)\b/g, "akkusativ")
            .replace(/\b(jemandem|jemanden|jemand)\s+(etwas)\b/g, "$2 $1");
    }

    function init() {
        const grid = document.getElementById('lek-grid');
        grid.innerHTML = "";
        for(let i=1; i<=12; i++) {
            const b = document.createElement('div');
            b.className = `btn-sub ${i === currentLek ? 'active' : ''}`;
            b.style.borderColor = i === currentLek ? 'var(--primary)' : 'var(--border)';
            b.innerText = `Lek ${i}`;
            b.onclick = () => {
                currentLek = i;
                localStorage.setItem('b2_last_lek', i);
                document.querySelectorAll('#lek-grid .btn-sub').forEach(el => el.style.borderColor = 'var(--border)');
                document.getElementById('btn-fehler').style.background = 'rgba(255,255,255,0.05)';
                b.style.borderColor = 'var(--primary)';
                renderList();
            };
            grid.appendChild(b);
        }

        if (currentLek === 'fehler') {
            document.querySelectorAll('#lek-grid .btn-sub').forEach(el => el.style.borderColor = 'var(--border)');
            document.getElementById('btn-fehler').style.background = 'rgba(248, 113, 113, 0.2)';
        }

        data.forEach(v => { 
            if (mastery[v.word] === undefined) mastery[v.word] = { s: 0, w: 0, a: true }; 
        });
        
        localStorage.setItem('b2_pro_v1', JSON.stringify(mastery));
        renderList(); renderHeat();
    }

    function renderList() {
        const currentData = data.filter(v => currentLek === 'fehler' ? (v.type && v.type.includes("Fehler")) : v.lek == currentLek);
        const masteredCount = currentData.filter(v => mastery[v.word] && mastery[v.word].s >= 3).length;
        
        const statsEl = document.getElementById('lek-stats');
        if(statsEl) {
            statsEl.innerText = `${masteredCount}/${currentData.length} 🔥`;
            if(masteredCount === currentData.length && currentData.length > 0) {
                statsEl.style.background = "var(--success)"; statsEl.style.color = "#000";
            } else {
                statsEl.style.background = "rgba(52, 211, 153, 0.1)"; statsEl.style.color = "var(--success)";
            }
        }

        document.getElementById('vocab-list').innerHTML = currentData.map(v => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border)">
                <div style="display:flex; align-items:center; flex: 1;">
                    <input type="checkbox" ${mastery[v.word].a?'checked':''} onchange="mastery['${v.word}'].a=this.checked; save();" style="cursor:pointer">
                    <div style="margin-left:12px">
                        <div style="font-size:14px; font-weight:600; color:var(--text)">${v.word}</div>
                        <div style="font-size:11px; color:rgba(248, 250, 252, 0.5)">${v.vnans}</div>
                    </div>
                </div>
                <span style="font-size:11px; font-weight:bold; color:var(--success)">🔥 ${mastery[v.word].s}/3</span>
            </div>
        `).join('');
    }

    function startSession(mode = 'normal') {
        isAdvancedMode = false; isMixedMode = (mode === 'mixed' || mode === 'quick'); isNoStreakMode = (mode === 'quick');
        let availablePool = [];

        if (isMixedMode) {
            availablePool = data.filter(v => mastery[v.word].a && mastery[v.word].s >= 3);
            if (availablePool.length === 0) return alert("Bạn chưa có từ nào đạt đủ Streak 3/3 để ôn tập!");
        } else {
            availablePool = data.filter(v => (currentLek === 'fehler' ? (v.type && v.type.includes("Fehler")) : v.lek == currentLek) && mastery[v.word].a && mastery[v.word].s < 3);
            if (availablePool.length === 0) return alert("Chúc mừng! Bạn đã học thuộc hết (đạt 3/3) các từ ở bài này!");
        }

        if (isMixedMode) {
            session = availablePool.sort(() => Math.random() - 0.5).slice(0, 15);
        } else {
            session = availablePool.slice(0, 5).sort(() => Math.random() - 0.5);
        }

        idx = 0; currentStep = 1; penaltyMode = false; penaltyCount = 0; isWaitingForNext = false;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        renderHeat(); showWord();
    }

                    <button class="btn-main" onclick="location.reload()">Về Menu (Enter)</button>
                </div>`;

        const v = session[idx]; const inputField = document.getElementById('ans-input');
        if (currentStep !== 1 && currentStep !== 2) currentStep = 1;

        let fullType = (v.type || "Wort").replace(/\bAdj\.?\b/gi, "Adjektiv").replace(/\bAdv\.?\b/gi, "Adverb");
        const stepText = isAdvancedMode ? (currentStep === 1 ? "B2 CỤM TỪ (Dịch)" : "B2 VÍ DỤ (Dịch nguyên câu)") : (currentStep === 1 ? "BƯỚC 1: TỪ GỐC" : "BƯỚC 2: CỤM TỪ");

        document.getElementById('q-type').innerHTML = `${quickModeTag}Wort ${idx + 1}/${session.length} | <span style="color: #fde047;">${fullType}</span> | ${stepText}`;

    function updateDots() {
        const v = session[idx]; const dotsContainer = document.getElementById('dots');
        dotsContainer.style.display = "flex"; dotsContainer.style.flexDirection = "column"; dotsContainer.style.alignItems = "center"; dotsContainer.style.gap = "10px";

            dotsContainer.innerHTML = `<div style="display: flex; gap: 6px;">${[1,2,3].map(i => `<div class="dot ${mastery[v.word].s >= i ? 'active' : ''}" style="width: 6px; height: 6px; ${mastery[v.word].s >= i ? 'background: #fbbf24; box-shadow: 0 0 8px #fbbf24;' : ''}"></div>`).join('')}</div>

        }
    }

    function processCheck() {
        if (isTransitioning || isWaitingForNext) return; 
        const input = document.getElementById('ans-input'); const v = session[idx];
        const target = isAdvancedMode ? (currentStep === 1 ? v.ans : v.b2_ex) : (currentStep === 1 ? v.word : v.ans);
        const correct = normalizeGerman(input.value) === normalizeGerman(target);

        if (!correct && currentStep === 1 && (v.type||"").toLowerCase().includes("nomen") && !penaltyMode && !isAdvancedMode) {
            const parts = target.split(',');
            if (parts.length > 1 && normalizeGerman(input.value) === normalizeGerman(parts[0])) {
                input.style.background = "rgba(251, 191, 36, 0.3)"; 
                document.getElementById('fb').innerHTML = `<div style="color: #fbbf24; font-weight: bold; margin-top: 10px;">⚠️ Bạn thiếu số nhiều rồi! Thêm dấu phẩy và đuôi số nhiều nhé.<br><span style="font-size: 12px; opacity: 0.8;">Gợi ý: ${target}</span></div>`;
                return; 
            }
        }

        if (correct) {
            speakGerman(target);
            if (penaltyMode) {
                if (++penaltyCount >= 3) {
                    penaltyMode = false; penaltyCount = 0; input.style.background = "var(--success)"; isTransitioning = true; 
                    setTimeout(() => { if (currentStep === 1) { currentStep = 2; showWord(); } else { currentStep = 1; idx++; showWord(); } isTransitioning = false; }, 200); 
                } else {
                    input.value = ""; input.style.background = "var(--success)"; setTimeout(() => input.style.background = "rgba(248, 113, 113, 0.2)", 200); updateDots();
                }
            } else {
                input.style.background = "var(--success)"; isTransitioning = true; 
                if (currentStep === 1) {
                    setTimeout(() => { currentStep = 2; isTransitioning = false; showWord(); }, 150);
                } else {
                    if (!isAdvancedMode && !isNoStreakMode) { mastery[v.word].s = isMixedMode ? 4 : mastery[v.word].s + 1; save(); }
                    setTimeout(() => { currentStep = 1; idx++; isTransitioning = false; showWord(); }, 150); 
                }
            }
        } else {
            speakGerman(target);
            if (isNoStreakMode) {
                input.style.background = "rgba(248, 113, 113, 0.2)"; showDetailFeedback(v, false); isWaitingForNext = true;
            } else {
                if (!penaltyMode) {
                    if (!isAdvancedMode) { mastery[v.word].s = 0; mastery[v.word].w = (mastery[v.word].w || 0) + 1; save(); renderHeat(); }
                    penaltyMode = true; penaltyCount = 0; 
                } else { penaltyCount = 0; }
                input.style.background = "rgba(248, 113, 113, 0.2)"; updateDots(); showDetailFeedback(v, false);
            }
        }
    }

    function showDetailFeedback(v, isCorrect) {
        const fb = document.getElementById('fb');
        const primaryDisplay = isAdvancedMode ? (currentStep === 1 ? v.ans : v.b2_ex) : (currentStep === 1 ? v.word : v.ans);
        const secondaryDisplay = isAdvancedMode ? (currentStep === 1 ? v.word : v.ans) : (currentStep === 1 ? v.ans : v.word);
        let warningText = isNoStreakMode ? "⚠️ Sai rồi! (Streak được bảo toàn). Hãy xem kỹ đáp án và <u style='color:#fff'>bấm Enter</u> để đi tiếp!" : "⚠️ Sai rồi! Hãy gõ lại chính xác 3 lần! /Falsch! Bitte geben Sie es dreimal richtig ein!";

        fb.innerHTML = `
            <div style="cursor:default; margin-top:15px; padding:15px; background:rgba(255,255,255,0.05); border-radius:16px; text-align:left; border: 1px solid ${isCorrect ? 'var(--success)' : 'var(--danger)'}">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; color:var(--primary); font-weight:700; margin-bottom:5px; font-size:16px;">
                    <div>🇩🇪 ${primaryDisplay}</div>
                    <button class="speaker-btn" onclick="event.stopPropagation(); speakGerman('${primaryDisplay.replace(/'/g, "\\'")}')">🔊</button>
                </div>
                ${!isCorrect ? `<div style="font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:10px;">Ghi chú: ${secondaryDisplay}</div>` : ''}
                <div style="font-size:12px; margin-bottom:5px; color:var(--success)">VN (Gốc): ${v.vnword}</div>
                <div style="font-size:13px; margin-bottom:10px; opacity:0.9">VN (Cụm): ${v.vnans}</div>
                <div style="font-size:11px; margin-bottom:10px; opacity:0.7; font-style: italic;">${v.forms}</div>
                <div style="font-size:13px; border-top:1px solid var(--border); padding-top:10px">
                    <p style="margin:5px 0 2px 0; color: #f8fafc;"><b>B1+:</b> ${v.b1_ex}</p><p style="margin:0 0 10px 0; font-size:12px; opacity:0.7; font-style: italic;">${v.vn_b1}</p>
                    <p style="margin:5px 0 2px 0; color: #f8fafc;"><b>B2:</b> ${v.b2_ex}</p><p style="margin:0 0 5px 0; font-size:12px; opacity:0.7; font-style: italic;">${v.vn_b2}</p>
                </div>
                ${!isCorrect ? `<p style="color:var(--danger); font-size:12px; margin-top:10px; text-align:center; font-weight:bold;">${warningText}</p>` : `<p style="color:var(--success); font-size:11px; margin-top:10px; text-align:center;">✨ Chính xác! Tự động lướt qua... ✨</p>`}
            </div>
        `;
    }

   window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); 
            if (isTransitioning) return; 
            const menuScreen = document.getElementById('menu-screen'); const quizScreen = document.getElementById('quiz-screen'); const input = document.getElementById('ans-input');
            if (!menuScreen.classList.contains('hidden')) { startSession('normal'); return; }
            if (document.getElementById('finish-card')) { location.reload(); return; }
            if (!quizScreen.classList.contains('hidden')) {
                if (typeof isWaitingForNext !== 'undefined' && isWaitingForNext) {
                    isWaitingForNext = false;
                    if (currentStep === 1) { currentStep = 2; } else { currentStep = 1; idx++; }
                    showWord(); return;
                }
                if (input && input.value.trim() !== "") { processCheck(); }
            }
        }
    });

    function renderHeat() {
        const cloud = document.getElementById('heat-cloud');
        const fails = data.filter(v => (mastery[v.word].w || 0) > 0).sort((a,b) => mastery[b.word].w - mastery[a.word].w);
        if (fails.length === 0) { cloud.innerHTML = `<p style="text-align:center; font-size:12px; opacity:0.4">Chưa có dữ liệu heatmap.</p>`; return; }
        cloud.innerHTML = fails.map((v, index) => {
            const failCount = mastery[v.word].w; const fontSize = Math.min(13 + failCount * 2, 22); const opacity = Math.min(0.3 + failCount * 0.15, 1);
            return `<div class="heat-item" style="border-left: 4px solid rgba(248, 113, 113, ${opacity}); background: rgba(248, 113, 113, 0.05); padding: 12px; margin-bottom: 10px; border-radius: 12px; flex-direction: column; align-items: stretch;">
                    <div style="display:flex; justify-content:space-between; align-items: center; width: 100%;">
                        <div><b style="font-size: ${fontSize}px; color: var(--danger)">${v.word}</b><span style="font-size: 11px; font-weight: bold; color: var(--danger); background: rgba(248, 113, 113, 0.2); padding: 2px 6px; border-radius: 4px; margin-left: 8px;">Lỗi: ${failCount}</span></div>
                        <button id="heat-btn-${index}" onclick="toggleHeatDetail(${index})" style="background: none; border: 1px solid var(--border); color: var(--text); border-radius: 6px; cursor: pointer; padding: 4px 12px; font-size: 16px; font-weight: bold;">+</button>
                    </div>
                    <div style="font-size: 13px; color: var(--primary); font-weight: 600; margin-top: 5px;">Cụm từ: ${v.ans}</div>
                    <div id="heat-detail-${index}" class="hidden" style="margin-top: 10px; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 10px;">
                        <div style="font-size: 12px; color: #cbd5e1;"><b>Nghĩa:</b> ${v.vnword} | <i style="opacity: 0.8">${v.vnans}</i></div>
                        <div style="font-size: 11px; margin-top: 4px; opacity: 0.6; font-style: italic;">${v.forms}</div>
                        <div style="font-size: 12px; margin-top: 8px; color: #94a3b8; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px;">
                            <p style="margin: 0 0 4px 0; color: #f8fafc;"><b>B1:</b> ${v.b1_ex}</p><p style="margin: 0 0 10px 0; opacity: 0.7; font-style: italic;">${v.vn_b1}</p>
                            <p style="margin: 0 0 4px 0; color: #f8fafc;"><b>B2:</b> ${v.b2_ex}</p><p style="margin: 0; opacity: 0.7; font-style: italic;">${v.vn_b2}</p>
                        </div>
                    </div></div>`;
        }).join('');
    }
    
    function toggleHeatDetail(index) {
        const detailDiv = document.getElementById(`heat-detail-${index}`); const btn = document.getElementById(`heat-btn-${index}`);
        if (detailDiv.classList.contains('hidden')) { detailDiv.classList.remove('hidden'); btn.innerText = '−'; btn.style.background = 'rgba(255,255,255,0.1)'; } else { detailDiv.classList.add('hidden'); btn.innerText = '+'; btn.style.background = 'none'; }
    }

    function save() { localStorage.setItem('b2_pro_v1', JSON.stringify(mastery)); renderList(); }
    function toggleAll(st) { data.forEach(v => mastery[v.word].a = st); save(); renderList(); }
    function resetStreak() { if(confirm("Xóa streak?")) { data.forEach(v => mastery[v.word].s = 0); save(); renderList(); } }
    function resetHeat() { if(confirm("Xóa heatmap?")) { data.forEach(v => mastery[v.word].w = 0); save(); renderHeat(); } }

    init(); 
</script>
</body>
</html>
